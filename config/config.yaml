# config/config.yaml
# 프로젝트 설정 파일 (환경별로 분기 가능)
paths:
  master_dir: "data/master"
  active_dir: "data/active"
  global_vocab: "data/active/global_vocab.db"
  unknown_db: "data/active/unknown_patterns.db"
  logs_dir: "logs"
  metrics_dir: "metrics"

collectors:
  neis_info:
    timeout_seconds: 3600
    parallel_timeout_seconds: 7200
    merge_timeout_seconds: 3600
    max_workers: 4
    cpu_factor: 1.0
    max_by_api: 10
    absolute_max: 16
  school_info:
    timeout_seconds: 3600
    parallel_timeout_seconds: 7200
    merge_timeout_seconds: 3600
    max_workers: 4
    cpu_factor: 1.0
    max_by_api: 10
    absolute_max: 16
  meal:
    timeout_seconds: 1800
    parallel_timeout_seconds: 3600
    merge_timeout_seconds: 1800
    max_workers: 2
    cpu_factor: 0.8
    max_by_api: 5
    absolute_max: 8
  schedule:
    timeout_seconds: 3600
    parallel_timeout_seconds: 7200
    merge_timeout_seconds: 3600
    max_workers: 4
    cpu_factor: 1.0
    max_by_api: 10
    absolute_max: 16
  timetable:
    timeout_seconds: 3600
    parallel_timeout_seconds: 7200
    merge_timeout_seconds: 3600
    max_workers: 4
    cpu_factor: 1.0
    max_by_api: 10
    absolute_max: 16

api:
  neis_api_key_env: "NEIS_API_KEY"
  neis_keys_json_env: "NEIS_KEYS_JSON"
  vworld_api_key_env: "VWORLD_API_KEY"
  kakao_api_key_env: "KAKAO_API_KEY"
  kakao_rest_api: "KAKAO_REST_API"
  school_info_api_key_env: "SCHOOL_INFO_API_KEY"
  kasi_api_key: "KASI_API_KEY"
  