name: Weekly Schedule Collection

on:
  schedule:
    - cron: '40 21 * * 0'
  workflow_dispatch:
    inputs:
      year:
        description: '수집할 학년도 (YYYY)'
        required: false
        default: ''

jobs:
  collect:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: "Gyeonggi-odd-A",  region: "J10", shard: "odd",  range: "A"    }
          - { name: "Gyeonggi-odd-B",  region: "J10", shard: "odd",  range: "B"    }
          - { name: "Gyeonggi-even-A", region: "J10", shard: "even", range: "A"    }
          - { name: "Gyeonggi-even-B", region: "J10", shard: "even", range: "B"    }
          - { name: "Seoul-odd",       region: "B10", shard: "odd",  range: "none" }
          - { name: "Seoul-even",      region: "B10", shard: "even", range: "none" }
          - { name: "Busan-odd",       region: "C10", shard: "odd",  range: "none" }
          - { name: "Busan-even",      region: "C10", shard: "even", range: "none" }
          - { name: "Daegu-odd",       region: "D10", shard: "odd",  range: "none" }
          - { name: "Daegu-even",      region: "D10", shard: "even", range: "none" }
          - { name: "Incheon-odd",     region: "E10", shard: "odd",  range: "none" }
          - { name: "Incheon-even",    region: "E10", shard: "even", range: "none" }
          - { name: "Gwangju",         region: "F10", shard: "none", range: "none" }
          - { name: "Daejeon",         region: "G10", shard: "none", range: "none" }
          - { name: "Ulsan",           region: "H10", shard: "none", range: "none" }
          - { name: "Sejong",          region: "I10", shard: "none", range: "none" }
          - { name: "Gangwon",         region: "K10", shard: "none", range: "none" }
          - { name: "Jeju",            region: "T10", shard: "none", range: "none" }

    steps:
      - uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-schedule-${{ matrix.name }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create directories
        run: mkdir -p data/active/schedule data/active/backups

      - name: Run Schedule Collector (${{ matrix.name }})
        env:
          NEIS_API_KEY: ${{ secrets.NEIS_API_KEY }}
        run: |
          YEAR="${{ github.event.inputs.year }}"
          if [ -z "${YEAR}" ]; then
            YEAR=$(date -u -d '9 hours' '+%Y')
          fi

          CMD="python collectors/schedule_collector.py \
            --regions ${{ matrix.region }} \
            --shard ${{ matrix.shard }} \
            --year ${YEAR}"

          if [ "${{ matrix.range }}" != "none" ]; then
            CMD="${CMD} --school_range ${{ matrix.range }}"
          fi

          echo "실행: ${CMD}"
          eval ${CMD}

      - name: Upload shard DB
        uses: actions/upload-artifact@v4
        with:
          name: schedule-shard-${{ matrix.name }}
          path: data/active/schedule/schedule_*.db

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: schedule-${{ matrix.name }}-logs
          path: data/active/schedule/*.log

  finalize:
    needs: collect
    if: always()
    uses: ./.github/workflows/_collector_base.yml          # ✅ 수정: _collector_base.yml
    with:
      collector-name: "schedule"
      merge-script: "merge_schedule_dbs.py"
      consolidate-vocab: true
    secrets:
      NEIS_API_KEY: ${{ secrets.NEIS_API_KEY }}
      NEIS_KEYS_JSON: ${{ secrets.NEIS_KEYS_JSON }}      # ✅ 추가
      # NEIS_KEYS_JSON은 base workflow에서 필요하지만 여기서 전달하지 않음 (주의)
      # base workflow에서 요구하므로 추가해야 함
      # 만약 base workflow에서 NEIS_KEYS_JSON을 필수로 요구한다면 아래와 같이 추가
      # NEIS_KEYS_JSON: ${{ secrets.NEIS_KEYS_JSON }}
