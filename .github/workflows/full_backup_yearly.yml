name: Yearly Academic Backup

on:
  schedule:
    - cron: "30 21 21 2 *"   # 2월 21일 21:30 UTC = 2월 22일 06:30 KST
  workflow_dispatch:
    inputs:
      collectors:
        description: "콤마 구분: school,meal,timetable,schedule (비우면 전체)"
        required: false
        default: ""
      mode:
        description: "실행 모드"
        required: true
        default: "full"
        type: choice
        options:
          - full
          - verify
          - list

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install OCI CLI
        run: |
          pip install oci-cli
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_CONFIG }}" > ~/.oci/config
          echo "${{ secrets.OCI_KEY_FILE }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Download school master data
        uses: actions/download-artifact@v4
        with:
          name: school-master-data
          path: data/master/
        continue-on-error: true

      - name: Run school master fallback if needed
        run: |
          if [ ! -f data/master/school_master.db ]; then
            echo "⚠️ school_master.db not found, running collector..."
            python collectors/school_master_collector.py --regions ALL
          fi
        env:
          NEIS_API_KEY: ${{ secrets.NEIS_API_KEY }}

      - name: Run backup
        run: |
          COLLECTORS_ARG=""
          if [ -n "${{ github.event.inputs.collectors }}" ]; then
            COLLECTORS_ARG="--collectors ${{ github.event.inputs.collectors }}"
          fi
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "${MODE}" ]; then
            MODE="full"
          fi
          python scripts/yearly_backup.py --${MODE} ${COLLECTORS_ARG}
        env:
          NEIS_API_KEY: ${{ secrets.NEIS_API_KEY }}

      - name: Sync backup to OCI
        run: |
          for i in {1..3}; do
            oci os object sync \
              --bucket-name ${{ secrets.OCI_BACKUP_BUCKET }} \
              --src-dir data/backup/ \
              --dest-dir backup/ && break || sleep 10
          done

      - name: Sync archive to OCI
        run: |
          for i in {1..3}; do
            oci os object sync \
              --bucket-name ${{ secrets.OCI_ARCHIVE_BUCKET }} \
              --src-dir data/archive/ \
              --dest-dir archive/ && break || sleep 10
          done

      - name: Upload backup artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backup-data
          path: data/backup/
          overwrite: true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-yearly-backup-${{ github.run_id }}
          path: logs/