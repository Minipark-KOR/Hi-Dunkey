name: Daily Collection Pipeline

on:
  schedule:
    - cron: '10 21 * * *'   # KST 06:10
  workflow_dispatch:
    inputs:
      year:
        description: '학년도(YYYY). 비우면 자동 계산'
        required: false
        type: string

permissions:
  contents: read
  issues: write

concurrency:
  group: daily-collection-${{ github.ref }}
  cancel-in-progress: false

env:
  TZ: Asia/Seoul
  NEIS_API_KEY: ${{ secrets.NEIS_API_KEY }}

jobs:
  daily-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (with pip cache)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine school year
        id: year
        env:
          INPUT_YEAR: ${{ inputs.year }}
        run: |
          if [ -n "$INPUT_YEAR" ]; then
            if [[ "$INPUT_YEAR" =~ ^[0-9]{4}$ ]]; then
              SCHOOL_YEAR="$INPUT_YEAR"
            else
              echo "❌ 잘못된 year 형식: $INPUT_YEAR"
              exit 1
            fi
          else
            SCHOOL_YEAR=$(python3 -c "
          from datetime import datetime
          n = datetime.now()
          print(n.year if n.month >= 3 else n.year - 1)
          ")
          fi
          echo "value=$SCHOOL_YEAR" >> "$GITHUB_OUTPUT"
          echo "📅 수집 학년도: $SCHOOL_YEAR"

      - name: Determine current semester
        id: semester
        run: |
          SEMESTER=$(python3 -c "
          from datetime import datetime
          m = datetime.now().month
          print('1' if 3 <= m <= 7 else '2')
          ")
          echo "value=$SEMESTER" >> "$GITHUB_OUTPUT"
          echo "📚 현재 학기: ${SEMESTER}"

      - name: Get date for cache key
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> "$GITHUB_OUTPUT"

      - name: Restore school DB cache
        uses: actions/cache@v4
        with:
          path: data/master/
          key: school-db-${{ github.ref_name }}-${{ steps.year.outputs.value }}-${{ steps.date.outputs.date }}
          restore-keys: |
            school-db-${{ github.ref_name }}-${{ steps.year.outputs.value }}-
            school-db-${{ github.ref_name }}-

      - name: Run school info collector
        id: school_info
        env:
          NEIS_KEYS_JSON: ${{ secrets.NEIS_KEYS_JSON }}
          VWORLD_API_KEY: ${{ secrets.VWORLD_API_KEY }}
        run: python scripts/run_pipeline.py school_info_collector --regions ALL

      - name: Verify school count
        id: verify
        run: |
          python3 - <<'PY'
          import os, sqlite3, sys
          db_path = "data/master/school_info.db"
          if not os.path.exists(db_path):
              print("❌ DB 파일 없음:", db_path)
              sys.exit(1)
          conn = sqlite3.connect(db_path)
          cur = conn.execute("SELECT COUNT(*) FROM schools;")
          count = cur.fetchone()[0]
          conn.close()
          print(f"✅ 학교 수: {count}")
          if count < 12000:
              print(f"❌ 학교 수 부족: {count}")
              sys.exit(1)
          PY

      # 아래 3개는 서로 독립: verify만 통과하면 항상 실행되도록(always + gate)
      - name: Run meal collector
        id: meal
        if: ${{ always() && steps.verify.conclusion == 'success' }}
        continue-on-error: true
        env:
          NEIS_KEYS_JSON: ${{ secrets.NEIS_KEYS_JSON }}
        run: >
          python scripts/run_pipeline.py meal_collector
          --year ${{ steps.year.outputs.value }}
          --regions ALL

      - name: Run schedule collector
        id: schedule
        if: ${{ always() && steps.verify.conclusion == 'success' }}
        continue-on-error: true
        env:
          NEIS_KEYS_JSON: ${{ secrets.NEIS_KEYS_JSON }}
        run: >
          python scripts/run_pipeline.py schedule_collector
          --year ${{ steps.year.outputs.value }}
          --regions ALL

      - name: Run timetable collector
        id: timetable
        if: ${{ always() && steps.verify.conclusion == 'success' }}
        continue-on-error: true
        env:
          NEIS_KEYS_JSON: ${{ secrets.NEIS_KEYS_JSON }}
        run: >
          python scripts/run_pipeline.py timetable_collector
          --year ${{ steps.year.outputs.value }}
          --semester ${{ steps.semester.outputs.value }}
          --regions ALL

      # 백업/업로드는 "verify 성공이면" 수행(선택 수집 일부 실패해도 백업은 남기기)
      - name: Upload all data to GitHub
        if: ${{ always() && steps.verify.conclusion == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: full-data-${{ steps.year.outputs.value }}-${{ github.run_id }}
          path: data/
          retention-days: 90
          if-no-files-found: error

      - name: Setup OCI CLI
        if: ${{ always() && steps.verify.conclusion == 'success' }}
        uses: oracle-actions/setup-oci-cli@v1
        with:
          user: ${{ secrets.OCI_CLI_USER }}
          tenancy: ${{ secrets.OCI_CLI_TENANCY }}
          fingerprint: ${{ secrets.OCI_CLI_FINGERPRINT }}
          region: ${{ secrets.OCI_CLI_REGION }}
          api_key: ${{ secrets.OCI_CLI_KEY_CONTENT }}
          generate_config: true

      - name: Upload all data to OCI
        if: ${{ always() && steps.verify.conclusion == 'success' }}
        env:
          OCI_BUCKET_NAME: ${{ secrets.OCI_BUCKET_NAME }}
          OCI_NAMESPACE: ${{ secrets.OCI_NAMESPACE }}
        run: |
          # ✅ 디렉토리 생성이 아니라 존재 검증(빈 백업 방지)
          if [ ! -d "data" ]; then
            echo "❌ data/ 디렉토리 없음"
            exit 1
          fi
          TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
          FILE_NAME="full_data_backup_${TIMESTAMP}.tar.gz"
          tar -czf "/tmp/$FILE_NAME" -C data .
          oci os object put \
            --bucket-name "$OCI_BUCKET_NAME" \
            --namespace "$OCI_NAMESPACE" \
            --file "/tmp/$FILE_NAME" \
            --name "$FILE_NAME"
          echo "✅ OCI 업로드 완료: $FILE_NAME"

      # continue-on-error 실패까지 포함해 이슈 생성(조건을 직접 계산)
      - name: Create issue on collector failure
        if: ${{ always() }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const runId = context.runId;
            const { owner, repo } = context.repo;

            // step conclusion은 success/failure/skipped/cancelled 등
            const meal = "${{ steps.meal.outcome || 'skipped' }}";
            const schedule = "${{ steps.schedule.outcome || 'skipped' }}";
            const timetable = "${{ steps.timetable.outcome || 'skipped' }}";
            const verify = "${{ steps.verify.conclusion }}";
            const schoolInfo = "${{ steps.school_info.conclusion }}";

            const failed = [meal, schedule, timetable].filter(x => x === "failure");
            const criticalFailed = (verify !== "success") || (schoolInfo !== "success");

            if (!criticalFailed && failed.length === 0) {
              core.info("No collector failures detected. Skip issue creation.");
              return;
            }

            const title = `🚨 파이프라인 경고/실패: #${runId}`;
            const body = [
              "## 상태 요약",
              `- 실행 링크: ${context.serverUrl}/${owner}/${repo}/actions/runs/${runId}`,
              `- school_info: ${schoolInfo}`,
              `- verify: ${verify}`,
              `- meal(outcome): ${meal}`,
              `- schedule(outcome): ${schedule}`,
              `- timetable(outcome): ${timetable}`,
              "",
              "필요 시 로그/아티팩트를 확인하세요."
            ].join("\n");

            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels: ["automation-failure"]
            });

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-logs-${{ github.run_id }}
          path: logs/
          if-no-files-found: warn
          