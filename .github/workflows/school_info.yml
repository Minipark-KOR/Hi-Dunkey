name: Neis Info Monthly Update

on:
  schedule:
    - cron: "0 2 1 * *"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: "Gyeonggi-odd-A",  region: "J10", shard: "odd",  range: "A"    }
          - { name: "Gyeonggi-odd-B",  region: "J10", shard: "odd",  range: "B"    }
          - { name: "Gyeonggi-even-A", region: "J10", shard: "even", range: "A"    }
          - { name: "Gyeonggi-even-B", region: "J10", shard: "even", range: "B"    }
          - { name: "Seoul-odd",       region: "B10", shard: "odd",  range: "none" }
          - { name: "Seoul-even",      region: "B10", shard: "even", range: "none" }
          - { name: "Busan-odd",       region: "C10", shard: "odd",  range: "none" }
          - { name: "Busan-even",      region: "C10", shard: "even", range: "none" }
          - { name: "Daegu-odd",       region: "D10", shard: "odd",  range: "none" }
          - { name: "Daegu-even",      region: "D10", shard: "even", range: "none" }
          - { name: "Incheon-odd",     region: "E10", shard: "odd",  range: "none" }
          - { name: "Incheon-even",    region: "E10", shard: "even", range: "none" }
          - { name: "Gwangju",         region: "F10", shard: "none", range: "none" }
          - { name: "Daejeon",         region: "G10", shard: "none", range: "none" }
          - { name: "Ulsan",           region: "H10", shard: "none", range: "none" }
          - { name: "Sejong",          region: "I10", shard: "none", range: "none" }
          - { name: "Gangwon",         region: "K10", shard: "none", range: "none" }
          - { name: "Chungbuk",        region: "M10", shard: "none", range: "none" }
          - { name: "Chungnam",        region: "N10", shard: "none", range: "none" }
          - { name: "Jeonbuk",         region: "P10", shard: "none", range: "none" }
          - { name: "Jeonnam",         region: "Q10", shard: "none", range: "none" }
          - { name: "Gyeongbuk",       region: "R10", shard: "none", range: "none" }
          - { name: "Gyeongnam",       region: "S10", shard: "none", range: "none" }
          - { name: "Jeju",            region: "T10", shard: "none", range: "none" }

    steps:
      - uses: actions/checkout@v4
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Set current year-month
        run: echo "YYYYMM=$(date +%Y%m)" >> $GITHUB_ENV
      - name: Restore neis_info.db from cache
        id: cache-master
        uses: actions/cache/restore@v4
        with:
          path: data/master/neis_info.db
          key: neis-info-${{ env.YYYYMM }}
          restore-keys: neis-info-
      - name: Create directories
        run: mkdir -p data/master data/active
      - name: Run Neis Info Collector
        env:
          NEIS_API_KEY: ${{ secrets.NEIS_API_KEY }}
          NEIS_KEYS_JSON: ${{ secrets.NEIS_KEYS_JSON }}
        run: |
          CMD="python collectors/neis_info_collector.py --regions ${{ matrix.region }} --shard ${{ matrix.shard }}"
          [ "${{ matrix.range }}" != "none" ] && CMD="${CMD} --school_range ${{ matrix.range }}"
          eval ${CMD}
      - name: Upload shard DB
        uses: actions/upload-artifact@v4
        with:
          name: neis-info-shard-${{ matrix.name }}
          path: data/master/neis_info_*.db
          retention-days: 7
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: neis-info-${{ matrix.name }}-logs
          path: data/master/*.log

  finalize:
    needs: collect
    if: always()
    uses: ./.github/workflows/_collector_base.yml
    with:
      collector-name: "neis_info"
      merge-script: "merge_neis_info_dbs.py"
      consolidate-vocab: false
    secrets:
      NEIS_API_KEY: ${{ secrets.NEIS_API_KEY }}
      NEIS_KEYS_JSON: ${{ secrets.NEIS_KEYS_JSON }}

  cache-result:
    needs: finalize
    runs-on: ubuntu-latest
    steps:
      - name: Set current year-month
        run: echo "YYYYMM=$(date +%Y%m)" >> $GITHUB_ENV
      - name: Download merged DB
        uses: actions/download-artifact@v4
        with:
          name: neis_info-total-db
          path: data/master/
      - name: Save neis_info.db to cache
        uses: actions/cache/save@v4
        with:
          path: data/master/neis_info.db
          key: neis-info-${{ env.YYYYMM }}
      - name: Upload to GitHub Release (fallback)
        run: |
          gh release upload latest-master \
            data/master/neis_info.db --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}