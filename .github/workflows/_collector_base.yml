name: Collector Base (Reusable)

on:
  workflow_call:
    inputs:
      collector-name:
        required: true
        type: string
      merge-script:
        required: true
        type: string
      consolidate-vocab:
        required: false
        type: boolean
        default: false
    secrets:
      NEIS_API_KEY:
        required: true
      NEIS_KEYS_JSON:
        required: true

jobs:
  prepare-vocab:
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.cache-vocab.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@v4
      - name: Set current year-month
        run: echo "YYYYMM=$(date +%Y%m)" >> $GITHUB_ENV
      - name: Cache global_vocab
        id: cache-vocab
        uses: actions/cache@v4
        with:
          path: data/active/global_vocab.db
          key: global-vocab-${{ inputs.collector-name }}-${{ env.YYYYMM }}
          restore-keys: |
            global-vocab-${{ inputs.collector-name }}-
            global-vocab-
      - name: Download global_vocab from Release (fallback)
        if: steps.cache-vocab.outputs.cache-hit != 'true'
        run: |
          mkdir -p data/active
          if gh release download latest-vocab \
               --pattern "global_vocab.db" \
               --dir data/active/ 2>/dev/null; then
            echo "✅ global_vocab downloaded from Release"
          else
            echo "⚠️ No global_vocab in Release; will be created fresh."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  merge:
    needs: prepare-vocab
    runs-on: ubuntu-latest
    if: always()
    env:                                             # ✅ PYTHONPATH 추가
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Set current year-month
        run: echo "YYYYMM=$(date +%Y%m)" >> $GITHUB_ENV
      - name: Restore global_vocab from cache
        uses: actions/cache/restore@v4
        with:
          path: data/active/global_vocab.db
          key: global-vocab-${{ inputs.collector-name }}-${{ env.YYYYMM }}
          fail-on-cache-miss: false
      - name: Download all shard artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Merge databases
        run: |
          DOMAIN="${{ inputs.collector-name }}"
          mkdir -p data/active/${DOMAIN}
          find artifacts -name "${DOMAIN}_*.db" -exec cp {} data/active/${DOMAIN}/ \; 2>/dev/null || true
          VOCAB_FLAG=""
          if [ "${{ inputs.consolidate-vocab }}" == "true" ]; then
            VOCAB_FLAG="--consolidate-vocab"
          fi
          python scripts/${{ inputs.merge-script }} ${VOCAB_FLAG}
      - name: Save updated global_vocab to cache
        uses: actions/cache/save@v4
        with:
          path: data/active/global_vocab.db
          key: global-vocab-${{ inputs.collector-name }}-${{ env.YYYYMM }}
      - name: Upload merged DB
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.collector-name }}-total-db
          path: data/active/${{ inputs.collector-name }}/${{ inputs.collector-name }}.db
          retention-days: 30
          