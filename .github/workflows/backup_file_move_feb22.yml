name: Move Old Backups to Archive

on:
  schedule:
    - cron: "0 6 22 2 *"      # 2월 22일 06:00 UTC = 15:00 KST
  workflow_dispatch:

jobs:
  move:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install OCI CLI
        run: |
          pip install oci-cli
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_CONFIG }}" > ~/.oci/config
          echo "${{ secrets.OCI_KEY_FILE }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Download backup artifacts
        uses: actions/download-artifact@v4
        with:
          name: backup-data
          path: data/backup/
        continue-on-error: true

      - name: Download previous archive
        uses: actions/download-artifact@v4
        with:
          name: archive-data
          path: data/archive/
        continue-on-error: true

      - name: Download school master data
        uses: actions/download-artifact@v4
        with:
          name: school-master-data
          path: data/master/
        continue-on-error: true

      - name: Run move script
        run: python scripts/move_feb22.py

      - name: Sync archive to OCI
        run: |
          for i in {1..3}; do
            oci os object sync \
              --bucket-name ${{ secrets.OCI_ARCHIVE_BUCKET }} \
              --src-dir data/archive/ \
              --dest-dir archive/ && break || sleep 10
          done

      - name: Upload updated archive
        uses: actions/upload-artifact@v4
        with:
          name: archive-data
          path: data/archive/
          overwrite: true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-move-feb22-${{ github.run_id }}
          path: logs/
          