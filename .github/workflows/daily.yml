name: daily-pipeline

on:
  workflow_dispatch:
  schedule:
    # 06:10 KST = 21:10 UTC (전일)
    - cron: '10 21 * * *'

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily collector
        env:
          NEIS_API_KEY: ${{ secrets.NEIS_API_KEY }}
          LOG_CONSOLE: 'true'
        run: |
          python scripts/misc/run_collector.py
