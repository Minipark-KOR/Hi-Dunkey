name: Auto Pull on Server
on:
  push:
    branches: [ main ]

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and pull
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/Hi-Dunkey
            git pull
            echo "✅ Pull 완료: $(date)"