name: feb20-full-collect

on:
  workflow_dispatch:
  schedule:
    # 2/20 06:00 KST = 2/19 21:00 UTC
    - cron: '0 21 19 2 *'

jobs:
  feb20:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run collection orchestrator
        env:
          NEIS_API_KEY: ${{ secrets.NEIS_API_KEY }}
          LOG_CONSOLE: 'true'
        run: |
          python scripts/misc/run_collector.py
