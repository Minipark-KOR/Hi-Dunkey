name: Create Decade Archive

on:
  schedule:
    - cron: "0 13 25 2 *"
  workflow_dispatch:
    inputs:
      start_year:
        description: "시작 연도"
        required: true
        default: "2020"
      end_year:
        description: "종료 연도"
        required: true
        default: "2029"

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install OCI CLI
        run: |
          pip install oci-cli
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_CONFIG }}"   > ~/.oci/config
          echo "${{ secrets.OCI_KEY_FILE }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Download archive data
        uses: actions/download-artifact@v4
        with:
          name: archive-data
          path: data/archive/
        continue-on-error: true

      - name: Run merge_decade
        run: |
          python scripts/merge_decade.py \
            --start ${{ github.event.inputs.start_year || '2020' }} \
            --end   ${{ github.event.inputs.end_year   || '2029' }}

      - name: Sync to OCI
        run: |
          for i in {1..3}; do
            oci os object sync \
              --bucket-name ${{ secrets.OCI_ARCHIVE_BUCKET }} \
              --src-dir data/archive/ \
              --dest-dir archive/ && break || sleep 15
          done

      - name: Upload updated archive
        uses: actions/upload-artifact@v4
        with:
          name: archive-data
          path: data/archive/
          overwrite: true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-create-decade-${{ github.run_id }}
          path: logs/
