name: Daily Collection Pipeline

on:
  schedule:
    # 매일 UTC 21:10 = 한국시간 06:10 (다음 날)
    - cron: '10 21 * * *'
  workflow_dispatch:

jobs:
  daily-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 1️⃣ 학교 기본정보 수집 (가장 먼저 실행)
      - name: Run school info collector
        env:
          NEIS_API_KEY: ${{ secrets.NEIS_API_KEY }}
          NEIS_KEYS_JSON: ${{ secrets.NEIS_KEYS_JSON }}
          VWORLD_API_KEY: ${{ secrets.VWORLD_API_KEY }}
        run: |
          cd ${{ github.workspace }}
          python scripts/run_pipeline.py school_info_collector --regions ALL

      # 2️⃣ 학교 수 검증 (최소 12,000개 이상)
      - name: Verify school count
        run: |
          COUNT=$(sqlite3 data/master/school_info.db "SELECT COUNT(*) FROM schools;")
          echo "📊 현재 학교 수: $COUNT"
          if [ $COUNT -lt 12000 ]; then
            echo "❌ 학교 수가 너무 적습니다. 파이프라인을 중단합니다."
            exit 1
          fi
          echo "✅ 학교 수 정상"

      # 3️⃣ 급식 수집 (2025학년도)
      - name: Run meal collector
        if: success()
        run: python scripts/run_pipeline.py meal_collector --year 2025 --regions ALL

      # 4️⃣ 학사일정 수집
      - name: Run schedule collector
        if: success()
        run: python scripts/run_pipeline.py schedule_collector --year 2025 --regions ALL

      # 5️⃣ 시간표 수집 (1,2학기)
      - name: Run timetable collector (semester 1)
        if: success()
        run: python scripts/run_pipeline.py timetable_collector --year 2025 --semester 1 --regions ALL
      - name: Run timetable collector (semester 2)
        if: success()
        run: python scripts/run_pipeline.py timetable_collector --year 2025 --semester 2 --regions ALL

      # 6️⃣ 로그 업로드 (항상)
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-logs-${{ github.run_id }}
          path: logs/
          