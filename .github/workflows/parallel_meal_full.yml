name: Parallel Meal Full Collection (by school year)

on:
  workflow_dispatch:
    inputs:
      year:
        description: '학년도 (예: 2025 → 2025.3 ~ 2026.2)'
        required: true
        default: '2025'

jobs:
  collect:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # 경기 (J10) - 4개 조합
          - region: "J10"
            shard: "odd"
            range: "A"
            name: "Gyeonggi-odd-A"
          - region: "J10"
            shard: "odd"
            range: "B"
            name: "Gyeonggi-odd-B"
          - region: "J10"
            shard: "even"
            range: "A"
            name: "Gyeonggi-even-A"
          - region: "J10"
            shard: "even"
            range: "B"
            name: "Gyeonggi-even-B"
          # 서울 (B10) - 2개 조합
          - region: "B10"
            shard: "odd"
            range: "none"
            name: "Seoul-odd"
          - region: "B10"
            shard: "even"
            range: "none"
            name: "Seoul-even"
          # 부산 (C10) - 2개 조합
          - region: "C10"
            shard: "odd"
            range: "none"
            name: "Busan-odd"
          - region: "C10"
            shard: "even"
            range: "none"
            name: "Busan-even"
          # 인천 (E10) - 2개 조합
          - region: "E10"
            shard: "odd"
            range: "none"
            name: "Incheon-odd"
          - region: "E10"
            shard: "even"
            range: "none"
            name: "Incheon-even"
          # 대구 (D10) - 2개 조합
          - region: "D10"
            shard: "odd"
            range: "none"
            name: "Daegu-odd"
          - region: "D10"
            shard: "even"
            range: "none"
            name: "Daegu-even"
          # 광주 (F10) - 1개
          - region: "F10"
            shard: "none"
            range: "none"
            name: "Gwangju"
          # 대전 (G10) - 1개
          - region: "G10"
            shard: "none"
            range: "none"
            name: "Daejeon"
          # 울산 (H10) - 1개
          - region: "H10"
            shard: "none"
            range: "none"
            name: "Ulsan"
          # 세종 (I10) - 1개
          - region: "I10"
            shard: "none"
            range: "none"
            name: "Sejong"
          # 강원 (K10) - 1개
          - region: "K10"
            shard: "none"
            range: "none"
            name: "Gangwon"
          # 충북 (M10) - 1개
          - region: "M10"
            shard: "none"
            range: "none"
            name: "Chungbuk"
          # 충남 (N10) - 1개
          - region: "N10"
            shard: "none"
            range: "none"
            name: "Chungnam"
          # 전북 (P10) - 1개
          - region: "P10"
            shard: "none"
            range: "none"
            name: "Jeonbuk"
          # 전남 (Q10) - 1개
          - region: "Q10"
            shard: "none"
            range: "none"
            name: "Jeonnam"
          # 경북 (R10) - 1개
          - region: "R10"
            shard: "none"
            range: "none"
            name: "Gyeongbuk"
          # 경남 (S10) - 1개
          - region: "S10"
            shard: "none"
            range: "none"
            name: "Gyeongnam"
          # 제주 (T10) - 1개
          - region: "T10"
            shard: "none"
            range: "none"
            name: "Jeju"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Create directories
        run: mkdir -p data/active/meal data/active/backups
      - name: Run Meal Collector
        env:
          NEIS_API_KEY: ${{ secrets.NEIS_API_KEY }}
        run: |
          RANGE_ARG=""
          if [ "${{ matrix.range }}" != "none" ]; then
            RANGE_ARG="--school_range ${{ matrix.range }}"
          fi
          python collectors/annual_full_meal_collector.py \
            --regions ${{ matrix.region }} \
            --year ${{ github.event.inputs.year }} \
            --shard ${{ matrix.shard }} \
            ${RANGE_ARG} \
            --debug
      - name: Upload shard DB
        uses: actions/upload-artifact@v4
        with:
          name: meal-shard-${{ matrix.name }}
          path: data/active/meal/meal_*.db

  merge:
    needs: collect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Download all shards
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Merge databases
        run: |
          mkdir -p data/active/meal
          find artifacts -name "meal_*.db" -exec cp {} data/active/meal/ \;
          python scripts/merge_meal_dbs.py --consolidate-vocab
      - name: Upload merged DB
        uses: actions/upload-artifact@v4
        with:
          name: meal-total-db
          path: data/active/meal/meal.db
          