name: feb22-backup

on:
  workflow_dispatch:
  schedule:
    # 2/22 06:00 KST = 2/21 21:00 UTC
    - cron: '0 21 21 2 *'

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run yearly backup
        env:
          NEIS_API_KEY: ${{ secrets.NEIS_API_KEY }}
          LOG_CONSOLE: 'true'
        run: |
          python scripts/run/backup.py
