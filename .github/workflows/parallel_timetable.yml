name: Parallel Timetable Collection

on:
  workflow_dispatch:
    inputs:
      year:
        description: '수집할 학년도'
        required: true
        default: '2025'
      semester:
        description: '학기 (1 또는 2)'
        required: true
        default: '1'

jobs:
  collect:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - region: "J10" shard: "odd" range: "A" name: "Gyeonggi-odd-A"
          - region: "J10" shard: "odd" range: "B" name: "Gyeonggi-odd-B"
          - region: "J10" shard: "even" range: "A" name: "Gyeonggi-even-A"
          - region: "J10" shard: "even" range: "B" name: "Gyeonggi-even-B"
          - region: "B10" shard: "odd" range: "none" name: "Seoul-odd"
          - region: "B10" shard: "even" range: "none" name: "Seoul-even"
          - region: "C10" shard: "odd" range: "none" name: "Busan-odd"
          - region: "C10" shard: "even" range: "none" name: "Busan-even"
          - region: "E10" shard: "odd" range: "none" name: "Incheon-odd"
          - region: "E10" shard: "even" range: "none" name: "Incheon-even"
          - region: "D10" shard: "odd" range: "none" name: "Daegu-odd"
          - region: "D10" shard: "even" range: "none" name: "Daegu-even"
          - region: "F10" shard: "none" range: "none" name: "Gwangju"
          - region: "G10" shard: "none" range: "none" name: "Daejeon"
          - region: "H10" shard: "none" range: "none" name: "Ulsan"
          - region: "I10" shard: "none" range: "none" name: "Sejong"
          - region: "K10" shard: "none" range: "none" name: "Gangwon"
          - region: "M10" shard: "none" range: "none" name: "Chungbuk"
          - region: "N10" shard: "none" range: "none" name: "Chungnam"
          - region: "P10" shard: "none" range: "none" name: "Jeonbuk"
          - region: "Q10" shard: "none" range: "none" name: "Jeonnam"
          - region: "R10" shard: "none" range: "none" name: "Gyeongbuk"
          - region: "S10" shard: "none" range: "none" name: "Gyeongnam"
          - region: "T10" shard: "none" range: "none" name: "Jeju"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Timetable Collector
        env:
          NEIS_API_KEY: ${{ secrets.NEIS_API_KEY }}
          NEIS_KEYS_JSON: ${{ secrets.NEIS_KEYS_JSON }}
        run: |
          RANGE_ARG=""
          if [ "${{ matrix.range }}" != "none" ]; then
            RANGE_ARG="--school_range ${{ matrix.range }}"
          fi
          python collectors/timetable_collector.py \   # 변경 없음
            --regions ${{ matrix.region }} \
            --year ${{ github.event.inputs.year }} \
            --semester ${{ github.event.inputs.semester }} \
            --shard ${{ matrix.shard }} \
            ${RANGE_ARG} \
            --debug
      - name: Upload shard DB
        uses: actions/upload-artifact@v4
        with:
          name: timetable-shard-${{ matrix.name }}
          path: data/active/timetable/timetable_*.db
          retention-days: 7

  merge:
    needs: collect
    uses: ./.github/workflows/_collector_base.yml
    with:
      collector-name: "timetable"
      merge-script: "merge_timetable_dbs.py"
      consolidate-vocab: true
    secrets:
      NEIS_API_KEY: ${{ secrets.NEIS_API_KEY }}
      NEIS_KEYS_JSON: ${{ secrets.NEIS_KEYS_JSON }}
      