name: School Master Monthly Update

on:
  schedule:
    - cron: "0 2 1 * *"          # 매월 1일 02:00 UTC
  workflow_dispatch:

env:
  YYYYMM: ${{ github.run_id }}

jobs:
  collect:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: "Gyeonggi-odd-A",  region: "J10", shard: "odd",  range: "A"    }
          - { name: "Gyeonggi-odd-B",  region: "J10", shard: "odd",  range: "B"    }
          - { name: "Gyeonggi-even-A", region: "J10", shard: "even", range: "A"    }
          - { name: "Gyeonggi-even-B", region: "J10", shard: "even", range: "B"    }
          - { name: "Seoul-odd",       region: "B10", shard: "odd",  range: "none" }
          - { name: "Seoul-even",      region: "B10", shard: "even", range: "none" }
          - { name: "Busan-odd",       region: "C10", shard: "odd",  range: "none" }
          - { name: "Busan-even",      region: "C10", shard: "even", range: "none" }
          - { name: "Incheon-odd",     region: "E10", shard: "odd",  range: "none" }
          - { name: "Incheon-even",    region: "E10", shard: "even", range: "none" }
          - { name: "Daegu-odd",       region: "D10", shard: "odd",  range: "none" }
          - { name: "Daegu-even",      region: "D10", shard: "even", range: "none" }
          - { name: "Gwangju",         region: "F10", shard: "none", range: "none" }
          - { name: "Daejeon",         region: "G10", shard: "none", range: "none" }
          - { name: "Ulsan",           region: "H10", shard: "none", range: "none" }
          - { name: "Sejong",          region: "I10", shard: "none", range: "none" }
          - { name: "Gangwon",         region: "K10", shard: "none", range: "none" }
          - { name: "Jeju",            region: "T10", shard: "none", range: "none" }

    steps:
      - uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set current year-month
        run: echo "YYYYMM=$(date +%Y%m)" >> $GITHUB_ENV

      - name: Restore school_master.db from cache
        id: cache-master
        uses: actions/cache/restore@v4
        with:
          path: data/master/school_master.db
          key: school-master-${{ env.YYYYMM }}
          restore-keys: school-master-

      - name: Create directories
        run: mkdir -p data/master data/active

      - name: Run School Master Collector (${{ matrix.name }})
        env:
          NEIS_API_KEY: ${{ secrets.NEIS_API_KEY }}
        run: |
          CMD="python collectors/school_master_collector.py \
            --regions ${{ matrix.region }} \
            --shard ${{ matrix.shard }}"
          if [ "${{ matrix.range }}" != "none" ]; then
            CMD="${CMD} --school_range ${{ matrix.range }}"
          fi
          eval ${CMD}

      - name: Upload shard DB
        uses: actions/upload-artifact@v4
        with:
          name: school-shard-${{ matrix.name }}
          path: data/master/school_master_*.db
          retention-days: 7

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: school-${{ matrix.name }}-logs
          path: data/master/*.log

  finalize:
    needs: collect
    if: always()
    uses: ./.github/workflows/_collector-base.yml
    with:
      collector-name: "school"
      merge-script: "merge_school_master_dbs.py"
      consolidate-vocab: false
    secrets:
      NEIS_API_KEY: ${{ secrets.NEIS_API_KEY }}

  cache-result:
    needs: finalize
    runs-on: ubuntu-latest
    steps:
      - name: Set current year-month
        run: echo "YYYYMM=$(date +%Y%m)" >> $GITHUB_ENV

      - name: Download merged DB
        uses: actions/download-artifact@v4
        with:
          name: school-total-db
          path: data/master/

      - name: Save school_master.db to cache
        uses: actions/cache/save@v4
        with:
          path: data/master/school_master.db
          key: school-master-${{ env.YYYYMM }}

      - name: Upload to GitHub Release (fallback)
        run: |
          gh release upload latest-master \
            data/master/school_master.db --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          