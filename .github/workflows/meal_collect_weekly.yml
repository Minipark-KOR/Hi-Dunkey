name: Weekly Meal Collection

on:
  schedule:
    - cron: '20 21 * * 0'  # 일요일 21:20 UTC = 월요일 06:20 KST
  workflow_dispatch:
    inputs:
      month:
        description: '수집할 월 (YYYYMM)'
        required: false
        default: ''

jobs:
  prepare-vocab:
    runs-on: ubuntu-latest
    outputs:
      vocab_exists: ${{ steps.check-vocab.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Check if vocab exists
        id: check-vocab
        run: |
          mkdir -p data/active/
          if gh release download latest-vocab --pattern "global_vocab.db" --dir data/active/ 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ GitHub Release에서 vocab DB 다운로드"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ vocab DB가 없습니다. 병합 시 vocab 통합 없이 진행됩니다."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload vocab for matrix jobs
        uses: actions/upload-artifact@v4
        with:
          name: global-vocab
          path: data/active/global_vocab.db
          if-no-files-found: ignore

  collect:
    needs: prepare-vocab
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Gyeonggi-odd-A"
            region: "J10"
            shard: "odd"
            range: "A"
          - name: "Gyeonggi-odd-B"
            region: "J10"
            shard: "odd"
            range: "B"
          - name: "Gyeonggi-even-A"
            region: "J10"
            shard: "even"
            range: "A"
          - name: "Gyeonggi-even-B"
            region: "J10"
            shard: "even"
            range: "B"
          - name: "Seoul-odd"
            region: "B10"
            shard: "odd"
            range: "none"
          - name: "Seoul-even"
            region: "B10"
            shard: "even"
            range: "none"
          - name: "Busan-odd"
            region: "C10"
            shard: "odd"
            range: "none"
          - name: "Busan-even"
            region: "C10"
            shard: "even"
            range: "none"
          - name: "Daegu-odd"
            region: "D10"
            shard: "odd"
            range: "none"
          - name: "Daegu-even"
            region: "D10"
            shard: "even"
            range: "none"
          - name: "Incheon-odd"
            region: "E10"
            shard: "odd"
            range: "none"
          - name: "Incheon-even"
            region: "E10"
            shard: "even"
            range: "none"
          - name: "Gwangju"
            region: "F10"
            shard: "none"
            range: "none"
          - name: "Daejeon"
            region: "G10"
            shard: "none"
            range: "none"
          - name: "Ulsan"
            region: "H10"
            shard: "none"
            range: "none"
          - name: "Sejong"
            region: "I10"
            shard: "none"
            range: "none"
          - name: "Gangwon"
            region: "K10"
            shard: "none"
            range: "none"
          - name: "Jeju"
            region: "T10"
            shard: "none"
            range: "none"

    steps:
      - uses: actions/checkout@v4
      
      - name: Download shared vocab
        uses: actions/download-artifact@v4
        with:
          name: global-vocab
          path: data/active/
        continue-on-error: true
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Create data directories
        run: |
          mkdir -p data/active/meal
          mkdir -p data/active/backups
      
      - name: Run Meal Collector (${{ matrix.name }})
        env:
          NEIS_API_KEY: ${{ secrets.NEIS_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.month }}" ]; then
            MONTH="${{ github.event.inputs.month }}"
          else
            MONTH=$(date -d "9 hours ago" '+%Y%m')
          fi
          
          CMD="python collectors/meal_collector.py \
            --regions ${{ matrix.region }} \
            --shard ${{ matrix.shard }} \
            --month ${MONTH}"
          
          if [ "${{ matrix.range }}" != "none" ] && [ -n "${{ matrix.range }}" ]; then
            CMD="${CMD} --school_range ${{ matrix.range }}"
          fi
          
          echo "실행: ${CMD}"
          eval ${CMD}
      
      - name: Upload shard DB
        uses: actions/upload-artifact@v4
        with:
          name: shard-${{ matrix.name }}
          path: data/active/meal/meal_*.db
      
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-logs
          path: data/active/meal/*.log

  merge:
    needs: [prepare-vocab, collect]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Merge databases with vocab consolidation
        run: |
          mkdir -p data/active/meal
          # shard 아티팩트에서만 meal DB 복사
          find artifacts/shard-* -name "meal_*.db" -exec cp {} data/active/meal/ \; 2>/dev/null || true
          
          python scripts/merge_meal_dbs.py --consolidate-vocab
      
      - name: Upload merged DB
        uses: actions/upload-artifact@v4
        with:
          name: meal-total-db
          path: data/active/meal/meal.db
          overwrite: true
          