name: april15-cleanup

on:
  workflow_dispatch:
  schedule:
    # 4/15 06:00 KST = 4/14 21:00 UTC
    - cron: '0 21 14 4 *'

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run archive cleanup
        env:
          NEIS_API_KEY: ${{ secrets.NEIS_API_KEY }}
          LOG_CONSOLE: 'true'
        run: |
          python scripts/misc/run_april15.py
