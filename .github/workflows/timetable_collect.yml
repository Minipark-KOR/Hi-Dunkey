name: Annual Timetable Collection

on:
  schedule:
    - cron: '0 2 1 3 *'   # 매년 3월 1일
  workflow_dispatch:
    inputs:
      year:
        description: '학년도'
        required: true
        default: '2025'

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run timetable collector
        env:
          NEIS_API_KEY: ${{ secrets.NEIS_API_KEY }}
          NEIS_KEYS_JSON: ${{ secrets.NEIS_KEYS_JSON }}
        run: |
          python collectors/timetable_collector.py --regions ALL --ay ${{ github.event.inputs.year }} --semester 1
          python collectors/timetable_collector.py --regions ALL --ay ${{ github.event.inputs.year }} --semester 2
          